<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Yönetim Paneli</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --color-background: #ffffff;
            --color-foreground: #111827;
            --color-border: #e5e7eb;
            --color-shadow: rgba(0, 0, 0, 0.04);
            --color-shadow-deep: rgba(0, 0, 0, 0.08);
            --color-primary: #3b82f6;
            --color-primary-hover: #2563eb;
            --color-success: #10b981;
            --color-error: #ef4444;
            --color-warning: #f59e0b;
            --hover-transition-duration: 0.25s;
            --hover-transition-timing: ease-out;
            --spacing-xs: 0.5rem;
            --spacing-sm: 0.75rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 3rem;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            color: var(--color-foreground);
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-xl);
        }

        /* Header */
        .header {
            background: var(--color-background);
            padding: var(--spacing-xl) var(--spacing-lg);
            border-radius: 12px;
            box-shadow: 0 1px 3px var(--color-shadow), 0 1px 2px var(--color-shadow-deep);
            margin-bottom: var(--spacing-2xl);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--spacing-lg);
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: var(--spacing-md);
            align-items: center;
        }

        /* Main Content */
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-2xl);
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        /* Card */
        .card {
            background: var(--color-background);
            border-radius: 12px;
            padding: var(--spacing-xl);
            box-shadow: 0 1px 3px var(--color-shadow), 0 1px 2px var(--color-shadow-deep);
            transition: box-shadow var(--hover-transition-duration) var(--hover-transition-timing),
                        transform var(--hover-transition-duration) var(--hover-transition-timing);
        }

        .card:hover {
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1), 0 4px 6px rgba(0, 0, 0, 0.05);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.25px;
        }

        /* Form */
        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: var(--spacing-sm);
            color: var(--color-foreground);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: var(--spacing-md);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color var(--hover-transition-duration) var(--hover-transition-timing),
                        box-shadow var(--hover-transition-duration) var(--hover-transition-timing);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }

        @media (max-width: 512px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* Button */
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-md) var(--spacing-lg);
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--hover-transition-duration) var(--hover-transition-timing);
            gap: var(--spacing-sm);
        }

        .button-primary {
            background: var(--color-primary);
            color: white;
            width: 100%;
        }

        .button-primary:hover {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .button-secondary {
            background: transparent;
            color: var(--color-primary);
            border: 1px solid var(--color-border);
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: 0.875rem;
        }

        .button-secondary:hover {
            background: var(--color-background);
            border-color: var(--color-primary);
        }

        .button-danger {
            background: var(--color-error);
            color: white;
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: 0.875rem;
        }

        .button-danger:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .button-success {
            background: var(--color-success);
            color: white;
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: 0.875rem;
        }

        /* List */
        .student-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .student-item {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding: var(--spacing-md);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            transition: all var(--hover-transition-duration) var(--hover-transition-timing);
            gap: var(--spacing-md);
        }

        .student-item:hover {
            background: #f9fafb;
            box-shadow: 0 1px 3px var(--color-shadow-deep);
            border-color: var(--color-primary);
        }

        .student-info {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }

        .student-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--color-foreground);
        }

        .student-detail {
            font-size: 0.875rem;
            color: #6b7280;
        }

        .student-detail strong {
            color: var(--color-foreground);
        }

        .student-actions {
            display: flex;
            gap: var(--spacing-sm);
            align-items: center;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-2xl);
            text-align: center;
            color: #9ca3af;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: var(--spacing-lg);
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1rem;
            margin-bottom: var(--spacing-md);
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-2xl);
            color: #6b7280;
        }

        .spinner {
            width: 2rem;
            height: 2rem;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: var(--spacing-md);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: 8px;
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--color-success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alert-icon {
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .alert-close {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.25rem;
            opacity: 0.7;
            transition: opacity var(--hover-transition-duration);
        }

        .alert-close:hover {
            opacity: 1;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .stat-card {
            background: linear-gradient(135deg, var(--color-primary), #1e40af);
            color: white;
            padding: var(--spacing-lg);
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
        }

        .stat-label {
            font-size: 0.875rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📚 Öğrenci Yönetim Paneli</h1>
            <div class="header-actions" id="statsContainer"></div>
        </div>

        <!-- Alerts -->
        <div id="alertContainer"></div>

        <!-- Main Content -->
        <div class="content">
            <!-- Form Card -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">✏️ Yeni Öğrenci Ekle</h2>
                </div>
                <form id="studentForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">Ad</label>
                            <input type="text" id="firstName" name="firstName" required placeholder="Öğrencinin adı">
                        </div>
                        <div class="form-group">
                            <label for="lastName">Soyadı</label>
                            <input type="text" id="lastName" name="lastName" required placeholder="Öğrencinin soyadı">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">E-posta</label>
                        <input type="email" id="email" name="email" required placeholder="ornek@email.com">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="phoneNumber">Telefon</label>
                            <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="05XX XXX XXXX">
                        </div>
                        <div class="form-group">
                            <label for="studentNumber">Öğrenci No</label>
                            <input type="text" id="studentNumber" name="studentNumber" placeholder="2024001">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="department">Bölüm</label>
                        <input type="text" id="department" name="department" placeholder="Bilgisayar Mühendisliği">
                    </div>
                    <div class="form-group">
                        <label for="notes">Notlar</label>
                        <textarea id="notes" name="notes" placeholder="Ek bilgiler..."></textarea>
                    </div>
                    <button type="submit" class="button button-primary">➕ Öğrenci Ekle</button>
                </form>
            </div>

            <!-- Students List Card -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">👥 Öğrenciler</h2>
                    <span id="studentCount" style="font-size: 0.875rem; color: #6b7280;"></span>
                </div>
                <div id="studentsList" class="student-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8082/api/students';

        // Alert Management
        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `
                <span class="alert-icon">${type === 'success' ? '✓' : '⚠'}</span>
                <span>${message}</span>
                <button class="alert-close">×</button>
            `;
            alertContainer.appendChild(alertDiv);

            alertDiv.querySelector('.alert-close').addEventListener('click', () => {
                alertDiv.remove();
            });

            setTimeout(() => {
                if (alertDiv.parentElement) {
                    alertDiv.remove();
                }
            }, 5000);
        }

        // Fetch Students
        async function fetchStudents() {
            const studentsList = document.getElementById('studentsList');
            studentsList.innerHTML = '<div class="loading"><div class="spinner"></div>Öğrenciler yükleniyor...</div>';

            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const students = await response.json();
                displayStudents(students);
                updateStats(students.length);
            } catch (error) {
                console.error('Error fetching students:', error);
                studentsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-text">Öğrenciler yüklenemedi</div>
                        <div style="font-size: 0.875rem; color: #9ca3af; margin-bottom: 1rem;">${error.message}</div>
                        <button class="button button-secondary" onclick="fetchStudents()">Tekrar Deneyin</button>
                    </div>
                `;
            }
        }

        // Display Students
        function displayStudents(students) {
            const studentsList = document.getElementById('studentsList');
            const studentCount = document.getElementById('studentCount');

            if (students.length === 0) {
                studentsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <div class="empty-state-text">Henüz öğrenci bulunmuyor</div>
                        <div style="font-size: 0.875rem; color: #9ca3af;">Sol taraftan yeni öğrenci ekleyin</div>
                    </div>
                `;
                studentCount.textContent = '0 öğrenci';
                return;
            }

            studentsList.innerHTML = '';
            students.forEach(student => {
                const item = document.createElement('div');
                item.className = 'student-item';
                item.innerHTML = `
                    <div class="student-info">
                        <div class="student-name">${escapeHtml(student.firstName)} ${escapeHtml(student.lastName)}</div>
                        <div class="student-detail"><strong>Email:</strong> ${escapeHtml(student.email)}</div>
                        ${student.studentNumber ? `<div class="student-detail"><strong>Öğrenci No:</strong> ${escapeHtml(student.studentNumber)}</div>` : ''}
                        ${student.department ? `<div class="student-detail"><strong>Bölüm:</strong> ${escapeHtml(student.department)}</div>` : ''}
                        ${student.phoneNumber ? `<div class="student-detail"><strong>Telefon:</strong> ${escapeHtml(student.phoneNumber)}</div>` : ''}
                    </div>
                    <div class="student-actions">
                        <button class="button button-danger" onclick="deleteStudent(${student.id})">🗑️</button>
                    </div>
                `;
                studentsList.appendChild(item);
            });

            studentCount.textContent = `${students.length} öğrenci`;
        }

        // Add Student
        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phoneNumber: document.getElementById('phoneNumber').value.trim() || null,
                studentNumber: document.getElementById('studentNumber').value.trim() || null,
                department: document.getElementById('department').value.trim() || null,
                notes: document.getElementById('notes').value.trim() || null
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                showAlert(`✓ ${formData.firstName} ${formData.lastName} başarıyla eklendi!`, 'success');
                document.getElementById('studentForm').reset();
                fetchStudents();
            } catch (error) {
                console.error('Error adding student:', error);
                showAlert('Öğrenci eklenirken bir hata oluştu', 'error');
            }
        });

        // Delete Student
        async function deleteStudent(id) {
            if (!confirm('Bu öğrenciyi silmek istediğinizden emin misiniz?')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                showAlert('Öğrenci başarıyla silindi', 'success');
                fetchStudents();
            } catch (error) {
                console.error('Error deleting student:', error);
                showAlert('Öğrenci silinirken bir hata oluştu', 'error');
            }
        }

        // Update Stats
        function updateStats(count) {
            const statsContainer = document.getElementById('statsContainer');
            statsContainer.innerHTML = `
                <div class="stat-card" style="background: linear-gradient(135deg, #3b82f6, #1e40af);">
                    <div class="stat-number">${count}</div>
                    <div class="stat-label">Toplam Öğrenci</div>
                </div>
            `;
        }

        // Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            fetchStudents();
        });

        // Auto-refresh every 30 seconds
        setInterval(fetchStudents, 30000);
    </script>
</body>
</html>
